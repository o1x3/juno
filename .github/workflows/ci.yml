name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install ripgrep (Grep tool dependency)
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run check

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build (compile standalone binary)
        run: bun run build:compile

      - name: Smoke (compiled binary)
        run: ./dist/juno --help
